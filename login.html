<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar - RAS IoT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="auth-card text-center">
    <h3 class="fw-bold mb-4 text-dark">RAS IoT System</h3>

    <div id="loginSection" class="form-section active">
        <h5 class="mb-3 text-muted">Masuk ke Akun Anda</h5>
        <form id="formLogin">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold small">Alamat Email</label>
                <input type="email" class="form-control" id="loginEmail" required placeholder="Tuliskan email anda">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold small">Kata Sandi</label>
                <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-3">MASUK</button>
        </form>
        <p class="small text-muted">Belum punya akun? <a href="#" onclick="toggleForm('register')" class="text-decoration-none fw-bold">Daftar di sini</a></p>
    </div>

    <div id="registerSection" class="form-section">
        <h5 class="mb-3 text-muted">Buat Akun Baru</h5>
        <form id="formRegister">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold small">Nama Lengkap</label>
                <input type="text" class="form-control" id="regNama" required placeholder="Tulis nama lengkap Anda">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label fw-bold small">Alamat Email</label>
                <input type="email" class="form-control" id="regEmail" required placeholder="Tulis email Anda">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold small">Kata Sandi</label>
                <input type="password" class="form-control" id="regPassword" required placeholder="Buat kata sandi">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2 mb-3">DAFTAR AKUN</button>
        </form>
        <p class="small text-muted">Sudah punya akun? <a href="#" onclick="toggleForm('login')" class="text-decoration-none fw-bold">Masuk di sini</a></p>
    </div>
</div>

<script>
    // --- KONFIGURASI API ---
    // Sesuaikan IP ini dengan IP WSL atau Localhost Anda saat pengujian
    const API_BASE_URL = 'http://172.19.127.91:5000';

    // Cek apakah pengguna sudah login, jika ya, tendang ke dashboard
    if (localStorage.getItem('ras_token')) {
        window.location.href = 'dashboard.html';
    }

    // Fungsi transisi antar formulir
    function toggleForm(target) {
        if (target === 'register') {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.add('active');
        } else {
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
        }
    }

    // Eksekusi Login
    document.getElementById('formLogin').addEventListener('submit', function(e) {
        e.preventDefault();
        const emailVal = document.getElementById('loginEmail').value;
        const passVal = document.getElementById('loginPassword').value;

        fetch(`${API_BASE_URL}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailVal, password: passVal })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'sukses') {
                // Simpan token dan data user ke memori peramban (Browser LocalStorage)
                localStorage.setItem('ras_token', data.token);
                localStorage.setItem('ras_user_nama', data.user.nama);
                localStorage.setItem('ras_chat_id', data.user.telegram_chat_id);
                // Lempar ke Dashboard
                window.location.href = 'dashboard.html';
            } else {
                alert("Gagal: " + data.pesan);
            }
        })
        .catch(err => alert("Gagal menghubungi peladen API. Pastikan app.py berjalan."));
    });

    // Eksekusi Registrasi
    document.getElementById('formRegister').addEventListener('submit', function(e) {
        e.preventDefault();
        const namaVal = document.getElementById('regNama').value;
        const emailVal = document.getElementById('regEmail').value;
        const passVal = document.getElementById('regPassword').value;

        fetch(`${API_BASE_URL}/api/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nama_lengkap: namaVal, email: emailVal, password: passVal })
        })
        .then(res => res.json())
        .then(data => {
            alert(data.pesan);
            if (data.status === 'sukses') {
                // Bersihkan formulir dan kembalikan ke layar login
                document.getElementById('formRegister').reset();
                toggleForm('login');
            }
        })
        .catch(err => alert("Gagal menghubungi peladen API. Pastikan app.py berjalan."));
    });
</script>

</body>
</html>
